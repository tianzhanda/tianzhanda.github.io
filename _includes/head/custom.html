<!-- Custom CSS -->
<style>
/* Page and Archive width custom */
@media (min-width: 80em) {
    .page {
        width:calc(100%);
        padding-inline-end:300px
    }
    .archive {
        width:calc(100%);
        padding-inline-end:300px
    }
    .page, .page__related, .page__content {
        float: left !important;
        clear: left !important;
    }
}

/* Hide Copy to clipboard text - all possible selectors */
.code-copy-button .sr-only,
.code-copy-button span,
.code-copy-button button span,
code + .code-copy-button span,
pre .code-copy-button span,
.button-holder .code-copy-button span,
.clipboard-button span,
[title="Copy to clipboard"] {
  display: none !important;
  visibility: hidden !important;
  width: 0 !important;
  height: 0 !important;
  overflow: hidden !important;
}
.code-copy-button {
  min-width: auto !important;
  padding: 4px 8px !important;
}
.code-copy-button::after {
  content: "📋" !important;
  font-size: 14px !important;
}

/* Breadcrumbs center */
.breadcrumbs {
  display: flex !important;
  justify-content: center;
  flex-wrap: wrap;
}
</style>

<!-- Page views counter - placed at bottom of page -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  var counter = document.createElement('div');
  counter.style.cssText = 'text-align:center;margin-top:30px;padding:10px;';
  counter.innerHTML = '<a href="https://hitscounter.dev" target="_blank"><img src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Ftianzhanda.github.io&label=Visitors&icon=eye-fill&color=%231d9bf0" alt="hits counter" /></a>';
  
  var main = document.querySelector('.page__content') || document.querySelector('main');
  if (main) {
    main.appendChild(counter);
  }
});
</script>
